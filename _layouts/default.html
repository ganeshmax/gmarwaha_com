<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: " en" }}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% seo %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/fontello.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Merriweather:wght@300;400;700;900&display=swap"
        rel="stylesheet">

    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
</head>

<body class="home blog">
    <div id="page" class="site">
        <header id="masthead" role="banner" class="header_normal">
            <div class="row top-banner m-0">
                <div class="container d-flex justify-content-between align-items-center">
                    <div class="banner-overlay"></div>
                    <a class="brand brand-text" href="/" title="{{ site.name }}" rel="home">
                        <h1>{{ site.name }}<small>{{ site.description }}</small></h1>
                    </a>
                    <div class="top-banner-social">
                        <a target="_blank" href="#"><i class="icon-facebook-1"></i></a>
                        <a target="_blank" href="https://twitter.com/{{site.twitter_username}}"><i
                                class="icon-twitter-1"></i></a>
                        <a target="_blank" href="#"><i class="icon-gplus-1"></i></a>
                        <a target="_blank" href="#"><i class="icon-linkedin-1"></i></a>
                        <a target="_blank" href="/feed.xml"><i class="icon-rss-1"></i></a>
                    </div>
                </div>
            </div>

            <div class="clean-navigation">
                <div class="container d-flex align-items-center justify-content-start">
                    <nav class="clean-nav">
                        <ul>
                            <li><a href="/">Home</a></li>
                            <li><a href="/about/">About</a></li>
                            <li class="dropdown position-relative">
                                <a href="/blog/" class="dropdown-toggle" data-toggle="dropdown">Blog <b
                                        class="caret"></b></a>
                                <ul class="dropdown-menu-clean">
                                    <li><a href="#">Latest Posts</a></li>
                                    <li><a href="#">Categories</a></li>
                                    <li><a href="#">Archives</a></li>
                                </ul>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>


        </header><!-- #masthead .site-header -->
        <div id="main" class="container content">
            {{ content }}
        </div><!-- #main -->
        <footer id="colophon" class="site-footer" role="contentinfo">
            <div class="container">
                <div class="row pt-4" id="footer-body">
                </div>
            </div>
            <div class="row mt-3 text-center" id="footer-bottom">
                &copy; {{ site.time | date: '%Y' }} {{ site.name }}
            </div>
        </footer>
    </div><!-- #page -->
    <link rel="stylesheet" href="/assets/css/prettify/prettify.css">
    <script src="/assets/js/prettify/prettify.js"></script>
    <script type="text/javascript">
        !function ($) {
            $(function () {
                window.prettyPrint && prettyPrint()
            })
        }(window.jQuery)
    </script>
</body>

</html>
